<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word-like Editor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .editor { border: 1px solid #ccc; padding: 10px; height: 500px; overflow-y: auto; }
        .footer { margin-top: 20px; text-align: center; }
        .pagination { margin-top: 10px; }
    </style>
</head>
<body>
    <div class="editor" contenteditable="true">
        <h1>Welcome to the Microsoft Word-like Editor</h1>
        <p>This is a sample content area where you can type...</p>
    </div>
    <div class="footer">
        <button onclick="toggleFooter()">Toggle Footer</button>
        <div class="footer-content" style="display: none;">
            <p>Footer content goes here</p>
        </div>
        <div class="pagination">
            <button onclick="prevPage()">Previous</button>
            <button onclick="nextPage()">Next</button>
        </div>
    </div>
    <script>
        function toggleFooter() {
            const footerContent = document.querySelector('.footer-content');
            footerContent.style.display = footerContent.style.display === 'none' ? 'block' : 'none';
        }

        function prevPage() {
            // Logic to handle previous page navigation
            alert('Going to previous page');
        }

        function nextPage() {
            // Logic to handle next page navigation
            alert('Going to next page');
        }
    </script>
</body>
</html>
