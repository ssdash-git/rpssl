<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Editor</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="toolbar">
        <button onclick="boldText()">Bold</button>
        <button onclick="italicizeText()">Italic</button>
        <button onclick="underlineText()">Underline</button>
        <select id="font-size" onchange="changeFontSize(this.value)">
            <option value="12">12</option>
            <option value="16">16</option>
            <option value="20">20</option>
            <option value="24">24</option>
        </select>
        <button onclick="addHeader()">Add Header</button>
        <button onclick="addFooter()">Add Footer</button>
        <button onclick="printDocument()">Print</button>
    </div>
    <div id="document-editor" contenteditable="true" class="document-editor">
        <h1 contenteditable="true">Document Title</h1>
        <p>Start typing your text here...</p>
    </div>
    <script>
        function boldText() {
            document.execCommand('bold');
        }
        function italicizeText() {
            document.execCommand('italic');
        }
        function underlineText() {
            document.execCommand('underline');
        }
        function changeFontSize(size) {
            document.execCommand('fontSize', false, '5');
            // Adjusting the font size via CSS
            document.querySelector('.document-editor').style.fontSize = size + 'px';
        }
        function addHeader() {
            const header = prompt('Enter header text:');
            if (header) {
                document.getElementById('document-editor').innerHTML = '<h2>' + header + '</h2>' + document.getElementById('document-editor').innerHTML;
            }
        }
        function addFooter() {
            const footer = prompt('Enter footer text:');
            if (footer) {
                document.getElementById('document-editor').innerHTML += '<footer>' + footer + '</footer>';
            }
        }
        function printDocument() {
            window.print();
        }
    </script>
</body>
</html>
